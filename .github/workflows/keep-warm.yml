name: Keep API warm

on:
  schedule:
    - cron: '*/5 * * * *'   # every 5 minutes
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping healthz
        run: |
          curl -sf "${{ secrets.VERCEL_APP_URL }}/healthz" \
            -o /dev/null -w "status: %{http_code} | time: %{time_total}s\n" \
            || echo "Ping failed (cold start triggered)"
